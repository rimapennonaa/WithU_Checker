<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WithUチェッカー</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff0f5; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .grid { display: grid; gap: 10px; justify-content: center; margin: 15px auto; }
        .item-wrapper { display: flex; flex-direction: column; align-items: center; }
        .grid img { width: 90px; height: 90px; object-fit: cover; cursor: pointer; border: 4px solid white; border-radius: 12px; transition: 0.3s; }
        .grid img.selected { border: 4px solid #ff69b4; }
        .grid img.dimmed { filter: brightness(0.6); }
        .grid img.correct-border { border: 4px solid #44ff44 !important; }
        .grid img.wrong-border { border: 4px solid #ff4444 !important; }
        .mv-label { font-size: 11px; color: #555; margin-top: 5px; font-weight: bold; }
        #mv-area { border-top: 6px solid #ffb6c1; margin-top: 20px; padding-top: 20px; display: none; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #ff69b4; color: white; cursor: pointer; margin: 5px; }
        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #result-content { background: white; padding: 20px; border-radius: 20px; width: 80%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        #res-img { width: 100%; margin: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="home-screen">
            <h1>WithUチェッカー</h1>
            <button onclick="startGame('easy')">かんたん(4マス)</button>
            <button onclick="startGame('normal')">ふつう(12マス)</button>
            <button onclick="startGame('hard')">むずかしい(16マス)</button>
            <hr>
            <button onclick="startTA()" style="background: #ff4444;">タイムアタック(12マスで5回正解するまでのタイムを測定するよ!)</button>
        </div>

        <div id="game-screen" style="display: none;">
            <div id="ta-info" style="display: none;">タイム: <span id="timer">0</span>秒 | 正解数: <span id="ta-count">0</span>/5</div>
            <h2 id="q-text"></h2>
            <div id="grid" class="grid"></div>
            <div id="controls">
                <button id="hint-btn" onclick="showHint()">ヒント</button>
                <button id="home-btn" onclick="location.reload()" style="display:none;">ホームに戻る</button>
                <button id="check-btn" onclick="check()">判定する！</button>
            </div>
            <div id="mv-area">
                <div id="mv-info"></div>
                <button onclick="location.reload()">難易度選択に戻る</button>
                <button onclick="startGame(mode)">もう一度</button>
            </div>
        </div>
    </div>

    <div id="result-overlay">
        <div id="result-content">
            <h2 id="msg"></h2>
            <img id="res-img" src="">
            <button onclick="closeResult()">閉じる</button>
        </div>
    </div>

        const mvData = {'HEARTRIS': { url: 'https://youtu.be/gRfDY9WrGwk', thumb: 'thumbnails/thumb_heartris.jpg' },
            'Make_you_happy': { url: 'https://youtu.be/QW28YKqdxe0', thumb: 'thumbnails/thumb_myh.jpg' },
            'Too_Bad': { url: 'https://youtu.be/b_GqrwmptWo', thumb: 'thumbnails/thumb_toobad.jpg' },
            'Step_and_a_step': { url: 'https://youtu.be/a6QT0acJFQE', thumb: 'thumbnails/thumb_stepandastep.jpg' },

'Chopstick': { url: 'https://youtu.be/nCjmXHsRJNY?si=S6BeEpqBHuMw3EqR', thumb: 'thumbnails/thumb_Chopstick.jpg' },

        let mode = '', currentTarget = '', taCount = 0, startTime = 0, timerInterval = null;

        function getGridCols() {
            if (mode === 'easy') return 2;
            if (mode === 'normal' || mode === 'ta') return window.innerWidth >= 600 ? 4 : 3;
            return 4;
        }

        function startTA() {
            mode = 'ta'; taCount = 0; startTime = Date.now();
            document.getElementById('ta-count').innerText = '0';
            document.getElementById('ta-info').style.display = 'block';
            clearInterval(timerInterval);
            timerInterval = setInterval(() => document.getElementById('timer').innerText = Math.floor((Date.now() - startTime) / 1000), 1000);
            startGame('ta');
        }

        function startGame(m) {
            mode = m;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('mv-area').style.display = 'none';
            document.getElementById('check-btn').style.display = 'inline-block';
            document.getElementById('hint-btn').style.display = (mode === 'ta') ? 'none' : 'inline-block';
            document.getElementById('home-btn').style.display = (mode === 'ta') ? 'inline-block' : 'none';
            setupRound();
        }

        function setupRound() {
            const mvs = Object.keys(mvData);
            currentTarget = mvs[Math.floor(Math.random() * mvs.length)];
            const cols = getGridCols();
            const total = (mode === 'easy' ? 4 : (mode === 'normal' || mode === 'ta' ? 12 : 16));
            const limits = { 'easy': [1,2], 'normal': [5,8], 'hard': [7,10], 'ta': [5,8] };
            const [min, max] = limits[mode];
            const corrects = imageList.filter(i => i.mv === currentTarget).sort(()=>0.5-Math.random());
            const others = imageList.filter(i => i.mv !== currentTarget).sort(()=>0.5-Math.random());
            const cCount = Math.min(Math.floor(Math.random() * (max - min + 1)) + min, corrects.length);
            const gameData = [...corrects.slice(0, cCount), ...others.slice(0, total - cCount)].sort(()=>0.5-Math.random());

            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.innerHTML = '';
            document.getElementById('q-text').innerText = `${currentTarget} のシーンを全て選んでね！`;
            
            gameData.forEach(img => {
                const div = document.createElement('div');
                div.className = 'item-wrapper';
                div.innerHTML = `<img src="${img.src}" onclick="this.classList.toggle('selected')" data-mv="${img.mv}"><div class="mv-label" style="display:none;">${img.mv}</div>`;
                grid.appendChild(div);
            });
        }

        function check() {
            let allCorrect = true;
            document.querySelectorAll('.grid img').forEach(img => {
                const isSelected = img.classList.contains('selected');
                const isCorrect = img.dataset.mv === currentTarget;
                if ((isSelected && !isCorrect) || (!isSelected && isCorrect)) allCorrect = false;
                if (mode !== 'ta') {
                    if (isSelected) img.classList.add('dimmed');
                    if (isCorrect) img.classList.add('correct-border');
                    else if (isSelected) img.classList.add('wrong-border');
                }
            });

            if (mode === 'ta') {
                if (allCorrect) taCount++;
                document.getElementById('ta-count').innerText = taCount;
                if (taCount >= 5) {
                    clearInterval(timerInterval);
                    document.getElementById('msg').innerText = `お疲れ様です！今回の記録は ${document.getElementById('timer').innerText}秒 です！`;
                    document.getElementById('res-img').src = 'result/correct.png';
                } else {
                    document.getElementById('msg').innerText = allCorrect ? "正解！" : "不正解...";
                    document.getElementById('res-img').src = allCorrect ? 'result/correct.png' : 'result/wrong.png';
                }
            } else {
                document.getElementById('msg').innerText = allCorrect ? "大正解！あなたは真のWithUです！！" : "残念！WithUの底力、こんなもんじゃないですよね？";
                document.getElementById('res-img').src = allCorrect ? 'result/correct.png' : 'result/wrong.png';
                document.querySelectorAll('.mv-label').forEach(el => el.style.display = 'block');
                document.getElementById('mv-info').innerHTML = `<h3>↓ ${currentTarget} のMVはこちら！！ ↓</h3><a href="${mvData[currentTarget].url}" target="_blank"><img src="${mvData[currentTarget].thumb}" style="width:100%; max-width:300px;"></a>`;
                document.getElementById('mv-area').style.display = 'block';
                document.getElementById('check-btn').style.display = 'none';
                document.getElementById('hint-btn').style.display = 'none';
            }
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function closeResult() {
            document.getElementById('result-overlay').style.display = 'none';
            if (mode === 'ta' && taCount < 5) setupRound();
            else if (mode === 'ta') location.reload();
        }
        
        function showHint() { alert(`今回の正解は ${document.querySelectorAll('.grid img[data-mv="' + currentTarget + '"]').length} 枚です！`); }
    </script>
</body>
</html>
